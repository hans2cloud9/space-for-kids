<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>우주 여행 — 아이들을 위한 우주 시뮬레이션</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪐</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; }
    body { font-family: 'Jua', -apple-system, 'Apple SD Gothic Neo', sans-serif; user-select: none; -webkit-user-select: none; }
    canvas { display: block; }

    #ui { position: fixed; inset: 0; pointer-events: none; z-index: 10; }

    /* 행성 이름 (상단 중앙) */
    #name-display {
      position: absolute; top: 5%; left: 50%; transform: translateX(-50%);
      font-size: clamp(40px, 8vw, 84px); color: #fff;
      text-shadow: 0 0 18px rgba(120,180,255,.9), 0 4px 10px rgba(0,0,0,.6);
      opacity: 0; transition: opacity .5s, transform .5s; white-space: nowrap;
    }
    #name-display.show { opacity: 1; transform: translateX(-50%) scale(1.06); }

    /* 자막 (하단) */
    #subtitle {
      position: absolute; bottom: 110px; left: 50%; transform: translateX(-50%);
      max-width: 86vw; padding: 10px 26px; border-radius: 30px;
      background: rgba(10, 20, 50, .55); backdrop-filter: blur(6px);
      color: #ffe; font-size: clamp(18px, 3.4vw, 28px); text-align: center;
      opacity: 0; transition: opacity .6s; white-space: nowrap;
    }
    #subtitle.show { opacity: 1; }

    /* 도착 사진 카드 (우측 중앙) */
    #photo-card {
      position: absolute; right: 18px; top: 50%;
      width: clamp(200px, 26vw, 320px);
      transform: translateY(-50%) translateX(30px); opacity: 0;
      background: rgba(12, 22, 50, .82); backdrop-filter: blur(8px);
      border: 3px solid rgba(140, 190, 255, .4); border-radius: 22px;
      padding: 12px; pointer-events: none;
      box-shadow: 0 8px 28px rgba(0,0,0,.55);
      transition: opacity .5s, transform .5s;
    }
    #photo-card.show { opacity: 1; transform: translateY(-50%) translateX(0); }
    #photo-card-media {
      width: 100%; aspect-ratio: 4 / 3; border-radius: 14px; overflow: hidden;
      background: rgba(40, 60, 110, .6); display: flex; align-items: center; justify-content: center;
    }
    #photo-card-img { width: 100%; height: 100%; object-fit: cover; display: none; }
    #photo-card-emoji { font-size: clamp(60px, 11vw, 110px); line-height: 1; }
    #photo-card-title {
      margin-top: 10px; color: #fff; font-size: clamp(20px, 3vw, 26px);
      text-align: center; text-shadow: 0 2px 8px rgba(0,0,0,.6);
    }
    #photo-card-landmark { color: #ffd966; font-size: clamp(15px, 2.2vw, 19px); text-align: center; margin-top: 2px; }
    #photo-card-facts { margin-top: 8px; color: #dfe9ff; font-size: clamp(14px, 2vw, 18px); line-height: 1.5; }
    #photo-card-facts div { margin: 3px 0; }

    /* 시간 버튼 (하단 중앙) */
    #time-controls {
      position: absolute; bottom: 22px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 14px; pointer-events: auto;
    }
    /* 줌 레벨 버튼 (우측) */
    #level-controls {
      position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
      display: flex; flex-direction: column; gap: 12px; pointer-events: auto;
    }
    /* 홈 + 소리 (좌측 상단) */
    #corner-controls {
      position: absolute; left: 16px; top: 16px;
      display: flex; gap: 12px; pointer-events: auto;
    }

    .big-btn {
      width: 64px; height: 64px; border-radius: 50%;
      border: 3px solid rgba(140, 190, 255, .45);
      background: rgba(15, 28, 65, .72);
      font-size: 30px; line-height: 1; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: transform .15s, background .2s, border-color .2s;
      box-shadow: 0 4px 14px rgba(0,0,0,.5);
      color: #fff;
    }
    .big-btn:active { transform: scale(.88); }
    .big-btn.active { background: rgba(70, 130, 255, .85); border-color: #aaccff; transform: scale(1.08); }
    @media (max-width: 600px) { .big-btn { width: 54px; height: 54px; font-size: 25px; } }

    /* 시작 화면 */
    #start-overlay {
      position: fixed; inset: 0; z-index: 20;
      background: radial-gradient(ellipse at center, #0b1740 0%, #02040f 75%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 28px; pointer-events: auto; transition: opacity .8s;
    }
    #start-overlay.hidden { opacity: 0; pointer-events: none; }
    #start-overlay h1 {
      color: #fff; font-size: clamp(34px, 7vw, 64px); font-weight: 400;
      text-shadow: 0 0 24px rgba(110,170,255,.8); text-align: center;
    }
    #start-overlay p { color: #9bb4e8; font-size: clamp(15px, 3vw, 20px); }
    .overlay-panel { display: flex; flex-direction: column; align-items: center; gap: 20px; z-index: 1; }
    .cta-btn {
      font-family: inherit; font-size: clamp(24px, 5vw, 36px);
      padding: 18px 48px; border-radius: 60px; border: none; cursor: pointer;
      background: linear-gradient(135deg, #ff9f43, #ff6b6b);
      color: #fff; box-shadow: 0 8px 30px rgba(255,120,70,.45);
      transition: transform .15s;
    }
    .cta-btn:active { transform: scale(.92); }
    .text-btn {
      background: none; border: none; cursor: pointer;
      font-family: inherit; font-size: 17px; color: #9bb4e8; text-decoration: underline;
    }
    .reg-title { color: #ffe9a8 !important; font-size: clamp(22px, 4.5vw, 34px) !important; }
    .reg-sub { font-size: clamp(13px, 2.5vw, 17px) !important; }
    #name-inputs { display: flex; flex-direction: column; gap: 12px; }
    .name-input {
      font-family: inherit; font-size: 26px; width: 250px; text-align: center;
      padding: 12px 20px; border-radius: 32px; outline: none;
      border: 3px solid rgba(140, 190, 255, .5);
      background: rgba(15, 28, 65, .85); color: #fff;
    }
    .name-input:focus { border-color: #ffd966; }
    .name-input.shake { animation: shake .35s; border-color: #ff6b6b; }
    @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
    .twinkle { position: absolute; border-radius: 50%; background: #fff; animation: tw 2.4s infinite ease-in-out; }
    @keyframes tw { 0%,100% { opacity: .15; } 50% { opacity: .9; } }

    /* 별 찾기 게임 버튼 (좌측 하단) */
    #quest-controls {
      position: absolute; left: 16px; bottom: 22px;
      display: flex; flex-direction: column; gap: 12px; pointer-events: auto;
    }
    .quest-btn {
      flex-direction: column; gap: 0; font-size: 22px;
      border-color: var(--qc);
      box-shadow: 0 0 14px color-mix(in srgb, var(--qc) 55%, transparent), 0 4px 14px rgba(0,0,0,.5);
    }
    .quest-btn span { font-size: 14px; color: var(--qc); line-height: 1.1; }

    /* 별 방향 화살표 칩 */
    .quest-chip {
      position: fixed; top: 0; left: 0; display: none;
      align-items: center; gap: 8px; padding: 8px 16px;
      border-radius: 24px; border: 2px solid var(--qc);
      background: color-mix(in srgb, var(--qc) 22%, rgba(5,10,30,.75));
      color: #fff; font-size: clamp(16px, 3vw, 22px); white-space: nowrap;
      pointer-events: none; will-change: transform; z-index: 15;
      animation: chip-pulse 1.1s infinite ease-in-out;
      text-shadow: 0 1px 4px rgba(0,0,0,.7);
    }
    .qa-arrow { display: inline-block; font-size: 1.2em; color: var(--qc); will-change: transform; }
    @keyframes chip-pulse { 0%,100% { filter: brightness(1); } 50% { filter: brightness(1.45); } }

    /* 로켓 여행: 목적지 바 (하단) */
    #dest-bar {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      display: none; gap: 10px; padding: 10px 14px; max-width: 92vw;
      overflow-x: auto; border-radius: 40px;
      background: rgba(10, 20, 50, .6); backdrop-filter: blur(8px);
      pointer-events: auto; scrollbar-width: none;
    }
    #dest-bar.show { display: flex; }
    #dest-bar::-webkit-scrollbar { display: none; }
    .dest-btn {
      flex: 0 0 auto; width: 58px; height: 58px; border-radius: 50%;
      border: 3px solid var(--dc, #88aaff); background: rgba(15, 28, 65, .8);
      cursor: pointer; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1px;
      font-family: inherit; color: #fff; transition: transform .15s;
    }
    .dest-btn:active { transform: scale(.86); }
    .dest-btn.active { background: var(--dc); box-shadow: 0 0 16px var(--dc); }
    .dest-dot { width: 20px; height: 20px; border-radius: 50%; background: var(--dc); box-shadow: 0 0 8px var(--dc); }
    .dest-btn span { font-size: 11px; line-height: 1; }
    .dest-btn .dest-emoji { font-size: 20px; line-height: 1; }

    /* 부스터 버튼 (우하단, 크게) */
    #btn-boost {
      position: absolute; right: 20px; bottom: 96px; display: none;
      width: 84px; height: 84px; font-size: 40px;
      border-color: rgba(255, 150, 60, .7);
      box-shadow: 0 0 20px rgba(255, 120, 40, .5), 0 4px 14px rgba(0,0,0,.5);
    }
    #btn-boost.show { display: flex; }
    #btn-boost.boosting { background: rgba(255, 120, 40, .85); transform: scale(1.1); }

    /* 찾았다! 꽃가루 */
    .confetti {
      position: fixed; top: -8vh; z-index: 30; pointer-events: none;
      font-size: 28px; animation: confetti-fall linear forwards;
    }
    @keyframes confetti-fall {
      from { transform: translateY(0) rotate(0deg); opacity: 1; }
      to { transform: translateY(120vh) rotate(660deg); opacity: .5; }
    }
  </style>
</head>
<body>
  <div id="ui">
    <div id="name-display"></div>
    <div id="subtitle"></div>
    <div id="photo-card">
      <div id="photo-card-media">
        <img id="photo-card-img" alt="">
        <div id="photo-card-emoji"></div>
      </div>
      <div id="photo-card-title"></div>
      <div id="photo-card-landmark"></div>
      <div id="photo-card-facts"></div>
    </div>
    <div id="corner-controls">
      <button class="big-btn" id="btn-home" title="전체 보기">🏠</button>
      <button class="big-btn" id="btn-sound" title="소리">🔊</button>
      <button class="big-btn" id="btn-launch" title="로켓 발사!">🚀</button>
      <button class="big-btn" id="btn-earth" title="지구 알아보기">🌍</button>
    </div>
    <div id="dest-bar"></div>
    <button class="big-btn" id="btn-boost" title="부스터!">🔥</button>
    <div id="time-controls">
      <button class="big-btn" id="speed-slow" title="천천히">🐢</button>
      <button class="big-btn active" id="speed-normal" title="보통">▶️</button>
      <button class="big-btn" id="speed-fast" title="빨리">🚀</button>
    </div>
    <div id="quest-controls"></div>
    <div id="level-controls">
      <button class="big-btn active" id="level-1" title="태양계">🪐</button>
      <button class="big-btn" id="level-2" title="이웃 별들">✨</button>
      <button class="big-btn" id="level-3" title="우리은하">🌌</button>
      <button class="big-btn" id="level-4" title="은하 친구들">🌀</button>
    </div>
  </div>

  <div id="start-overlay">
    <h1 id="start-title">우주 여행</h1>
    <div id="start-panel" class="overlay-panel">
      <p>행성을 콕 눌러 보세요. 휠을 굴리면 우주 멀리멀리!</p>
      <button id="start-btn" class="cta-btn">우주로 출발! 🚀</button>
      <button id="edit-names" class="text-btn">✏️ 아이 이름 바꾸기</button>
    </div>
    <div id="register-panel" class="overlay-panel" style="display:none">
      <p class="reg-title">⭐ 우리 아이 별을 등록하세요</p>
      <p class="reg-sub">아이 이름으로 우주에 별이 생겨요 (한 번만 입력하면 저장돼요)</p>
      <div id="name-inputs"></div>
      <button id="add-name" class="text-btn">＋ 한 명 더 추가</button>
      <button id="register-btn" class="cta-btn">등록하고 출발! 🚀</button>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
